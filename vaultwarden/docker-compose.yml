services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    env_file: .env
    labels:
      - com.centurylinklabs.watchtower.monitor-only=true
    ports:
      - "127.0.0.1:8888:80"
    volumes:
      - ${DATA_PATH}/vaultwarden:/data
    networks:
      - traefik_proxy
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/alive || wget -q -O /dev/null http://localhost/alive || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  traefik_proxy:
    external: true
