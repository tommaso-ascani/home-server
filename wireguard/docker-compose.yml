services:
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - ${DATA_PATH}/config:/config
      - ${DATA_PATH}/lib/modules:/lib/modules
    ports:
      - 51820:51820/udp
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 64m
    healthcheck:
      test: ["CMD-SHELL", "ip link show wg0 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
