services:
  nextcloud_db:
    image: postgres:16.4
    restart: unless-stopped
    container_name: nextcloud_db
    env_file: .env
    labels:
      - com.centurylinklabs.watchtower.monitor-only=true
    volumes:
      - db:/var/lib/postgresql/data
    networks:
      - nextcloud
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 30s
      timeout: 5s
      retries: 3

  app:
    image: nextcloud:latest
    restart: unless-stopped
    container_name: nextcloud
    env_file: .env
    labels:
      - com.centurylinklabs.watchtower.monitor-only=true
    depends_on:
      nextcloud_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${NEXTCLOUD_CONFIG}:/var/www/html
      - ${NEXTCLOUD_DATA}:/var/www/html/data
    networks:
      - traefik_proxy
      - nextcloud
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/status.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:latest
    restart: unless-stopped
    container_name: nextcloud_redis
    volumes:
      - redis:/data
    networks:
      - nextcloud
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  traefik_proxy:
    external: true
  nextcloud:
    internal: true

volumes:
  redis:
  db:
