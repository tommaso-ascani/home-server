services:
  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    volumes:
      - ${CONFIG_PATH}/radarr:/config
      - ${MEDIA_PATH}/film:/movies
      - ${MEDIA_PATH}/downloads:/downloads
    ports:
      - 7878:7878
    restart: unless-stopped
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7878/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    volumes:
      - ${CONFIG_PATH}/sonarr:/config
      - ${MEDIA_PATH}/tv:/tv
      - ${MEDIA_PATH}/downloads:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8989/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    volumes:
      - ${CONFIG_PATH}/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9696/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  transmission:
    image: linuxserver/transmission:latest
    container_name: transmission
    volumes:
      - ${CONFIG_PATH}/transmission:/config
      - ${MEDIA_PATH}/downloads:/downloads
    ports:
      - 9091:9091
    restart: unless-stopped
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9091/transmission/rpc -o /dev/null -w '%{http_code}' | grep -q '409' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  plex:
    image: linuxserver/plex:latest
    container_name: plex
    network_mode: host
    volumes:
      - ${CONFIG_PATH}/plex:/config
      - ${MEDIA_PATH}/tv:/tv
      - ${MEDIA_PATH}/film:/movies
      - ${CONFIG_PATH}/transcode/plex:/transcode
    restart: unless-stopped
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:32400/identity || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TZ}
    ports:
      - 8191:8191
    volumes:
      - ${CONFIG_PATH}/flaresolverr:/config
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8191/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
