services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    env_file: .env
    network_mode: host
    volumes:
      - ${HASS_CONFIG_PATH}:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    labels:
      - com.centurylinklabs.watchtower.monitor-only=true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8123/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  hassio_db:
    image: postgres:16.4
    restart: unless-stopped
    container_name: hassio_db
    env_file: .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ${HASS_CONFIG_PATH}/database:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 30s
      timeout: 5s
      retries: 3

  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto
    env_file: .env
    volumes:
    - ${MOSQUITTO_CONFIG_PATH}/config:/mosquitto/config
    - ${MOSQUITTO_CONFIG_PATH}/log:/mosquitto/log
    - ${MOSQUITTO_CONFIG_PATH}/data/:/mosquitto/data
    restart: unless-stopped
    ports:
    - 1883:1883
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h 127.0.0.1 -p 1883 -t 'healthcheck' -m 'ping' -q 0 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
